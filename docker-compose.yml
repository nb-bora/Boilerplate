services:
  api:
    build: .
    environment:
      - APP_ENV=dev
      - APP_LOG_LEVEL=info
      - CORS_ORIGINS=http://localhost:3000
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/boilerplate
      - REDIS_ENABLED=false
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16
    environment:
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_DB=boilerplate
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d boilerplate"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    profiles: ["redis"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:

